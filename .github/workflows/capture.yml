name: Capture signal

# Cron de GitHub Actions (UTC). Cada 4 h, al minuto 1, igual que el scheduler local.
# Nota: el cron de Actions puede retrasarse o saltarse bajo carga; el backfill del
# job rellena cualquier vela que se haya perdido en la siguiente corrida.
on:
  schedule:
    - cron: "1 */4 * * *"
  workflow_dispatch: {}

concurrency:
  group: capture-signal
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture + backfill + evaluate
        run: python -m app.jobs.capture
        env:
          # Binance responde 451 (geobloqueo) desde la IP del runner de GitHub.
          # KuCoin es accesible globalmente y da el mismo régimen (OHLCV BTC/USDT
          # casi idéntico). El backtest/validación local siguen en Binance.
          EXCHANGE_ID: kucoin
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Alertas push (salientes). Si no defines los secrets de Telegram, el
          # envío se omite solo; el guardado en Supabase ocurre igual.
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
